<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <!-- Tailwind CSS CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for social media icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Custom styles for a dark, sleek theme */
        body {
            background-color: #1a202c; /* Tailwind's gray-900 */
            color: #e2e8f0; /* Tailwind's gray-200 */
            font-family: 'Inter', sans-serif;
        }
        .countdown-segment {
            transition: all 0.5s ease-in-out;
            transform: scale(1);
        }
        .countdown-segment:hover {
            transform: scale(1.05);
        }
        /* Custom gradient for the Instagram button */
        .instagram-gradient {
            background: #f09433; 
            background: -moz-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            background: -webkit-linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); 
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#f09433', endColorstr='#bc1888',GradientType=1 );
        }
        .instagram-gradient:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="text-center space-y-8 max-w-3xl w-full">
        <!-- Main Heading -->
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight text-white animate-pulse">
            System Under Maintenance
        </h1>

        <!-- Maintenance Message -->
        <p id="maintenance-message" class="text-lg md:text-xl font-medium text-slate-400">
            Loading maintenance information...
        </p>

        <!-- Countdown Timer -->
        <div id="countdown-container" class="mt-12 flex justify-center items-center flex-wrap gap-4 md:gap-8 hidden">
            <div class="countdown-segment bg-slate-800 p-6 rounded-xl shadow-lg flex-1 min-w-[120px] max-w-[180px]">
                <div id="days" class="text-5xl md:text-6xl font-bold text-sky-400">00</div>
                <div class="text-slate-400 text-sm md:text-base mt-2">Days</div>
            </div>
            <div class="countdown-segment bg-slate-800 p-6 rounded-xl shadow-lg flex-1 min-w-[120px] max-w-[180px]">
                <div id="hours" class="text-5xl md:text-6xl font-bold text-sky-400">00</div>
                <div class="text-slate-400 text-sm md:text-base mt-2">Hours</div>
            </div>
            <div class="countdown-segment bg-slate-800 p-6 rounded-xl shadow-lg flex-1 min-w-[120px] max-w-[180px]">
                <div id="minutes" class="text-5xl md:text-6xl font-bold text-sky-400">00</div>
                <div class="text-slate-400 text-sm md:text-base mt-2">Minutes</div>
            </div>
            <div class="countdown-segment bg-slate-800 p-6 rounded-xl shadow-lg flex-1 min-w-[120px] max-w-[180px]">
                <div id="seconds" class="text-5xl md:text-6xl font-bold text-sky-400">00</div>
                <div class="text-slate-400 text-sm md:text-base mt-2">Seconds</div>
            </div>
        </div>
        
        <!-- Social Media Connect Buttons -->
        <!-- These buttons provide a way for users to stay connected during maintenance -->
        <div class="mt-12 space-y-4">
            <h2 class="text-2xl font-bold text-white">Stay Connected with Us</h2>
            <div class="flex flex-col md:flex-row justify-center items-center gap-4">
                <a href="#" class="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-semibold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-lg">
                    <i class="fab fa-facebook-f"></i>
                    <span>Connect on Facebook</span>
                </a>
                <a href="#" class="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-semibold text-white bg-gray-800 hover:bg-gray-700 transition-colors shadow-lg">
                    <i class="fab fa-twitter"></i>
                    <span>Connect on X</span>
                </a>
                <a href="#" class="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-semibold text-white instagram-gradient transition-colors shadow-lg">
                    <i class="fab fa-instagram"></i>
                    <span>Connect on Instagram</span>
                </a>
            </div>
        </div>

        <!-- Completion Message -->
        <p id="completion-message" class="text-xl md:text-2xl font-semibold mt-12 text-green-400 hidden">
            We're back online! Thank you for your patience.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const maintenanceMessageElement = document.getElementById('maintenance-message');
            const countdownElements = {
                days: document.getElementById('days'),
                hours: document.getElementById('hours'),
                minutes: document.getElementById('minutes'),
                seconds: document.getElementById('seconds'),
            };
            const countdownContainer = document.getElementById('countdown-container');
            const completionMessage = document.getElementById('completion-message');

            let interval;

            const fetchMaintenanceInfo = async () => {
                try {
                    const response = await fetch('api/superadmin_api.php?action=get_maintenance_info');
                    const result = await response.json();
                    if (result.success && result.maintenance_mode_active === '1') {
                        maintenanceMessageElement.textContent = result.maintenance_message;
                        countdownContainer.classList.remove('hidden');

                        const targetDate = new Date(result.maintenance_end_date);
                        
                        const updateCountdown = () => {
                            const now = new Date().getTime();
                            const distance = targetDate - now;

                            if (distance < 0) {
                                clearInterval(interval);
                                countdownContainer.classList.add('hidden');
                                completionMessage.textContent = 'Maintenance is complete. Redirecting...';
                                completionMessage.classList.remove('hidden');
                                setTimeout(() => {
                                    window.location.href = '/'; // Redirect to the main site
                                }, 3000);
                                return;
                            }

                            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                            const formatNumber = (num) => String(num).padStart(2, '0');

                            countdownElements.days.textContent = formatNumber(days);
                            countdownElements.hours.textContent = formatNumber(hours);
                            countdownElements.minutes.textContent = formatNumber(minutes);
                            countdownElements.seconds.textContent = formatNumber(seconds);
                        };

                        updateCountdown();
                        interval = setInterval(updateCountdown, 1000);

                    } else {
                        // Maintenance is off, redirect to the main page
                        maintenanceMessageElement.textContent = 'Site is now online. Redirecting...';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);
                    }
                } catch (error) {
                    maintenanceMessageElement.textContent = 'Error fetching maintenance status. Redirecting to main site...';
                    console.error('API Error:', error);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 5000);
                }
            };
            
            fetchMaintenanceInfo();
        });
    </script>
</body>
</html>
